name: Deploy to Vercel

on:
  push:
    branches: [master]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Vercel Hobby блокирует деплой коммитов с noreply-автором GitHub (TEAM_ACCESS_REQUIRED:
      # почта автора должна совпадать с аккаунтом Vercel), а merge-коммиты PR создаёт GitHub
      # именно с таким автором. Без .git CLI не прикладывает git-метаданные — проверки нет.
      - name: Strip git metadata
        run: rm -rf .git

      - name: Deploy
        run: npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
